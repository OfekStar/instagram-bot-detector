name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Type-check & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint
